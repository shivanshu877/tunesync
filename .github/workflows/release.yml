name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Read version from tag
        id: version
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Patch Makefile to use the tag's version
        run: |
          sed -i '' "s/DMG        = TuneSync-.*\.dmg/DMG        = TuneSync-${{ steps.version.outputs.version }}.dmg/" Makefile
          sed -i '' "s|<key>CFBundleVersion</key><string>.*</string>|<key>CFBundleVersion</key><string>${{ steps.version.outputs.version }}</string>|" Makefile
          sed -i '' "s|<key>CFBundleShortVersionString</key><string>.*</string>|<key>CFBundleShortVersionString</key><string>${{ steps.version.outputs.version }}</string>|" Makefile

      - name: Build DMG
        run: make dmg

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG..${{ steps.version.outputs.tag }}")
          else
            NOTES=$(git log --pretty=format:"- %s" "${{ steps.version.outputs.tag }}")
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TuneSync ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: TuneSync-${{ steps.version.outputs.version }}.dmg

      - name: Stage Pages artifacts
        run: |
          mkdir -p _pages
          cp TuneSync-${{ steps.version.outputs.version }}.dmg _pages/
          # Always-current symlink so the index page can deep-link a stable URL.
          (cd _pages && ln -sf TuneSync-${{ steps.version.outputs.version }}.dmg TuneSync-latest.dmg)
          NOTES=$(cat <<'NOTES_EOF'
          ${{ steps.notes.outputs.notes }}
          NOTES_EOF
          )
          jq -n \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg url "https://${{ github.repository_owner }}.github.io/tunesync/TuneSync-${{ steps.version.outputs.version }}.dmg" \
            --arg notes "$NOTES" \
            '{version: $version, url: $url, notes: $notes}' \
            > _pages/updates.json
          cat > _pages/index.html <<'HTML'
          <!doctype html>
          <html><head>
          <meta charset="utf-8">
          <title>TuneSync</title>
          <style>
            body { font: 16px/1.55 -apple-system, BlinkMacSystemFont, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; color: #1d1d1f; }
            h1 { font-size: 2.2rem; margin-bottom: .5rem; }
            .ver { color: #6e6e73; }
            .btn { display: inline-block; background: #0066ff; color: #fff; padding: .8rem 1.2rem; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 1rem 0; }
            pre { background: #f5f5f7; padding: 1rem; border-radius: 8px; overflow-x: auto; }
          </style></head><body>
          <h1>TuneSync</h1>
          <p>Sync YouTube Music across Macs on the same Wi-Fi.</p>
          <p><a class="btn" href="TuneSync-latest.dmg">Download latest DMG</a></p>
          <p class="ver">Version metadata: <a href="updates.json">updates.json</a></p>
          </body></html>
          HTML

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_pages
          keep_files: true
          enable_jekyll: false
          commit_message: "release: v${{ steps.version.outputs.version }}"
